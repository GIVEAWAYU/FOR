<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Exclusive Reward...</title>
    <meta http-equiv="refresh" content="5;url=https://www.af9m8trk.com/C7511BS8/KDQ122LY/">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --header-gradient: linear-gradient(90deg, #ff8c00, #ff0080);
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            width: 90%;
        }

        h1 { font-size: 28px; margin-bottom: 10px; }
        p { font-size: 18px; opacity: 0.9; }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff0080;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #timer {
            font-weight: bold;
            color: #ffeb3b;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <h1>Verifying Your Connection...</h1>
    <p>Please wait, you are being redirected to your reward.</p>
    <p>Redirecting in <span id="timer">5</span> seconds...</p>
    <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 20px 0;">
    <p style="font-size: 14px;">If you are not redirected, <a href="https://www.af9m8trk.com/C7511BS8/KDQ122LY/" style="color: #ffeb3b;">click here</a>.</p>
</div>

<script>
    const offerLink = "https://www.af9m8trk.com/C7511BS8/KDQ122LY/";
    let timeLeft = 5;
    const timerElement = document.getElementById('timer');

    // কাউন্টডাউন ফাংশন
    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            window.location.href = offerLink; // জাভাস্ক্রিপ্ট রিডাইরেক্ট
        }
    }, 1000);

    // সিকিউরিটির জন্য ১ সেকেন্ড পর অটোমেটিক লিঙ্ক লোড করার চেষ্টা
    setTimeout(() => {
        // কিছু ব্রাউজারে পপ-আপ ব্লকার থাকে, তাই location.href সবচেয়ে নিরাপদ
        window.location.href = offerLink;
    }, 5500);
</script>

</body>
</html>
